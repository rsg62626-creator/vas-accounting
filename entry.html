<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4a90e2">
    <link rel="icon" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <title>VAS - 会計入力</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="./index.html"><i class="fa-solid fa-arrow-left"></i> 戻る</a>
        <span>会計入力</span>
        <div></div>
    </nav>

    <div class="container-sm">
        <form id="entry-form">
            <div class="form-group">
                <label>区分</label>
                <div class="radio-group">
                    <label><input type="radio" name="type" value="支出" checked> 支出</label>
                    <label><input type="radio" name="type" value="収入"> 収入</label>
                </div>
            </div>

            <div class="form-group">
                <label>日付</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label>勘定科目</label>
                <select id="category" required></select>
            </div>

            <div class="form-group">
                <label>金額 (数字のみ)</label>
                <input type="text" id="amount" oninput="onlyNumber(this)" placeholder="1000" required>
            </div>

            <div class="form-group">
                <label>摘要</label>
                <input type="text" id="description" placeholder="例：ボールペン購入">
            </div>

            <div class="form-group">
                <label>内訳（任意）</label>
                <input type="text" id="detail" placeholder="例：10本セット（単価100円）">
            </div>

            <div class="form-group">
                <label>レシート・領収書</label>
                <select id="receipt_status" onchange="toggleReceiptFile()">
                    <option value="不要">不要</option>
                    <option value="あとで登録">あとで登録</option>
                    <option value="あり">あり（画像アップロード）</option>
                </select>
            </div>

            <div class="form-group" id="receipt-file-group" style="display: none;">
                <label>レシート画像選択</label>
                <input type="file" id="receipt_file" accept="image/*">
            </div>

            <button type="submit" class="btn-submit"><i class="fa-solid fa-cloud-arrow-up"></i> 登録する</button>
        </form>
    </div>

    <script src="./js/app.js"></script>
    <script src="./js/api.js"></script>

    <script>
        function toggleReceiptFile() {
            const status = document.getElementById('receipt_status').value;
            document.getElementById('receipt-file-group').style.display = (status === 'あり') ? 'block' : 'none';
        }

        const fileToBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        let categoriesData = { income: [], expense: [] };

        async function loadCategories() {
            setTodayIfEmpty('date');

            const settings = await callGasAPI("getSettings", {});

            if (!settings.success) {
                showMessage("カテゴリの取得に失敗しました", true);
                return;
            }

            categoriesData = settings.categories || { income: [], expense: [] };
            updateCategoryOptions();
        }

        function updateCategoryOptions() {
            const type = document.querySelector('input[name="type"]:checked').value;
            const list = (type === "収入") ? categoriesData.income : categoriesData.expense;

            const select = document.getElementById("category");
            select.innerHTML = "";

            list.forEach(cat => {
                const option = document.createElement("option");
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }

        window.addEventListener("load", loadCategories);

        document.querySelectorAll('input[name="type"]').forEach(radio => {
            radio.addEventListener('change', updateCategoryOptions);
        });

        document.getElementById('entry-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const type = document.querySelector('input[name="type"]:checked').value;
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;
            const amount = Number(document.getElementById('amount').value);

            const description = document.getElementById('description').value;
            const detail = document.getElementById('detail').value;

            const descriptionFinal = detail
                ? `${description}（${detail}）`
                : description;

            const receiptStatus = document.getElementById('receipt_status').value;
            const fileInput = document.getElementById('receipt_file');

            const formData = {
                type,
                date,
                category,
                amount,
                description: descriptionFinal,
                receiptStatus,
                imageData: null,
                imageName: null
            };

            if (receiptStatus === "あり" && fileInput.files.length > 0) {
                try {
                    const file = fileInput.files[0];
                    formData.imageData = await fileToBase64(file);
                    formData.imageName = file.name;
                } catch (err) {
                    showMessage("画像の読み込みに失敗しました", true);
                    return;
                }
            }

            toggleLoading(true);
            const response = await callGasAPI("saveEntry", formData);
            toggleLoading(false);

            if (response && response.success) {
                showMessage(`登録が完了しました！\n会計番号: ${response.id}\nレシート番号: ${response.receiptNo}`);
                document.getElementById('entry-form').reset();
                toggleReceiptFile();
                setTodayIfEmpty('date');
            } else {
                showMessage("登録に失敗しました: " + (response ? response.message : "通信エラー"), true);
            }
        });
    </script>
</body>
</html>
