<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4a90e2">
    <link rel="icon" href="./icons/icon-192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <title>VAS - カテゴリ管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">

    <style>
        .category-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 20px 0 8px 0;
            font-weight: bold;
        }
        .category-section-title.income { color: #3498db; }
        .category-section-title.expense { color: #e74c3c; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="./settings.html"><i class="fa-solid fa-arrow-left"></i> 戻る</a>
        <span>カテゴリ管理</span>
        <div></div>
    </nav>

    <div class="container-sm">

        <div class="category-section-title income">
            <i class="fa-solid fa-circle-arrow-up"></i> 収入カテゴリ
        </div>
        <div class="category-list" id="income-category-list">
            <div class="category-item">読み込み中...</div>
        </div>

        <div class="category-section-title expense">
            <i class="fa-solid fa-circle-arrow-down"></i> 支出カテゴリ
        </div>
        <div class="category-list" id="expense-category-list">
            <div class="category-item">読み込み中...</div>
        </div>

        <h2><i class="fa-solid fa-plus"></i> カテゴリを追加</h2>

        <div class="form-group">
            <label>区分</label>
            <div class="radio-group">
                <label><input type="radio" name="new-cat-type" value="支出" checked> 支出</label>
                <label><input type="radio" name="new-cat-type" value="収入"> 収入</label>
            </div>
        </div>

        <div class="add-form">
            <input type="text" id="new-category" placeholder="例：交通費">
            <button onclick="addCategory()">追加</button>
        </div>

    </div>

    <script src="./js/app.js"></script>
    <script src="./js/api.js"></script>

    <script>
        async function loadCategories() {
            toggleLoading(true);
            const result = await callGasAPI("getCategories", {});
            toggleLoading(false);

            const incomeList = document.getElementById('income-category-list');
            const expenseList = document.getElementById('expense-category-list');

            if (!result.success) {
                incomeList.innerHTML = `<div class="category-item">取得に失敗しました</div>`;
                expenseList.innerHTML = `<div class="category-item">取得に失敗しました</div>`;
                return;
            }

            renderCategoryList(incomeList, result.income || [], "収入");
            renderCategoryList(expenseList, result.expense || [], "支出");
        }

        function renderCategoryList(container, categories, type) {
            if (categories.length === 0) {
                container.innerHTML = `<div class="category-item">カテゴリがありません</div>`;
                return;
            }

            container.innerHTML = "";
            categories.forEach(cat => {
                const div = document.createElement('div');
                div.className = 'category-item';
                div.innerHTML = `
                    <span>${cat}</span>
                    <button onclick="deleteCategory('${cat}', '${type}')"><i class="fa-solid fa-trash"></i> 削除</button>
                `;
                container.appendChild(div);
            });
        }

        async function addCategory() {
            const input = document.getElementById('new-category');
            const name = input.value.trim();
            const type = document.querySelector('input[name="new-cat-type"]:checked').value;

            if (!name) {
                showMessage("カテゴリ名を入力してください", true);
                return;
            }

            toggleLoading(true);
            const result = await callGasAPI("addCategory", { name, type });
            toggleLoading(false);

            if (result.success) {
                showMessage("カテゴリを追加しました");
                input.value = "";
                loadCategories();
            } else {
                showMessage(result.message, true);
            }
        }

        async function deleteCategory(name, type) {
            if (!confirm(`「${name}」を削除しますか？`)) return;

            toggleLoading(true);
            const result = await callGasAPI("deleteCategory", { name, type });
            toggleLoading(false);

            if (result.success) {
                showMessage("カテゴリを削除しました");
                loadCategories();
            } else {
                showMessage(result.message, true);
            }
        }

        window.addEventListener('load', loadCategories);
    </script>

</body>
</html>
